name: Bug report
description: Something is wrong with parsing, layout, or rendering.
labels: ["bug"]
body:
  - type: textarea
    id: plantuml
    attributes:
      label: PlantUML reproducer
      description: A minimal `@startuml … @enduml` snippet that triggers the issue.
      render: plantuml
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happens
      description: Stack trace, wrong output, or attached screenshot of the rendered diagram.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: excaliplant version
      placeholder: "0.1.4"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "20.x"
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  audit-dev:
    name: npm audit (dev, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate || true

  security-tests:
    name: Security tests (Node ${{ matrix.node }})
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run security regression suite
        run: node --test tests/security.test.mjs

  build:
    name: Build (docs + API)
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify generated docs are in sync (push to main only)
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- README.md docs/*.puml docs/*.excalidraw docs/*.svg; then
            echo "::error::Generated docs are out of sync. Run 'npm run build:docs' locally and commit the result."
            git --no-pager diff -- README.md docs/*.puml docs/*.excalidraw docs/*.svg
            exit 1
          fi
      - name: Upload built docs
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/

  pack-smoke:
    name: Pack + smoke install (${{ matrix.os }})
    needs: [test, build]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:docs
      - name: npm pack
        id: pack
        run: |
          mkdir -p tarball
          npm pack --pack-destination "$PWD/tarball"
          TARBALL=$(ls tarball/grethel-labs-excaliplant-*.tgz | head -1)
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Smoke-install in clean project
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          mkdir smoke-test
          cp scripts/smoke.mjs smoke-test/
          cd smoke-test
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "$TARBALL"
          node smoke.mjs

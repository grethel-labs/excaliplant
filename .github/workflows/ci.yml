name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The auto-amend job force-pushes regenerated docs back onto the PR head.
# That requires write access. For PRs from forks, GITHUB_TOKEN is read-only,
# so we fall back to a clear error message in those cases.
permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    name: Test (Node ${{ matrix.node }} / ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  typecheck:
    name: Type check (tsc --checkJs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high

  audit-dev:
    name: npm audit (dev, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate || true

  security-tests:
    name: Security tests (Node ${{ matrix.node }})
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: node --test tests/security.test.mjs

  # ---------------------------------------------------------------
  # PR docs rebuild + auto-amend
  # ---------------------------------------------------------------
  # Runs ONLY on pull_request. Rebuilds the docs against the PR HEAD,
  # checks for drift, and either:
  #   (a) amends the PR head commit with the regenerated docs and
  #       force-pushes, OR
  #   (b) fails with a clear message if the user edited README.md or
  #       generated artefacts manually (since the README is now
  #       template-driven, those manual edits are guaranteed to be lost).
  pr-docs-rebuild:
    name: Rebuild docs + amend PR
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Verify that any committed README.md / generated artefact is the
      # bit-exact output of `npm run build:docs`. The build writes
      # docs/.build-manifest.json with SHA-256 hashes of every generated
      # file; a manual edit (or a forgotten rebuild) makes the hashes
      # diverge and trips this check. Locally rebuilt docs are accepted
      # because the build updates the manifest and the file together.
      - name: "Guard: generated files must match build manifest"
        run: node docs/scripts/check-build-manifest.mjs

      - name: Rebuild docs
        run: npm run build:docs

      - name: Detect drift
        id: drift
        run: |
          if git diff --quiet -- README.md docs/ressources/generated/; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected:"
            git --no-pager diff --stat -- README.md docs/ressources/generated/
          fi

      - name: Amend + force-push regenerated docs
        if: steps.drift.outputs.drifted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/ressources/generated/
          # Amend onto whatever the PR's head commit currently is. Use
          # --no-edit so the user's commit message stays intact.
          git commit --amend --no-edit
          git push --force-with-lease origin "HEAD:${{ github.event.pull_request.head.ref }}"

  # main-docs-rebuild was removed: direct pushes to main are now blocked
  # by the "main: PR-only" ruleset. Doc drift is prevented by the
  # pr-docs-rebuild job that amends the regenerated README onto the PR
  # head commit before merge.

  pack-smoke:
    name: Pack + smoke install (${{ matrix.os }})
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: npm pack
        id: pack
        run: |
          mkdir -p tarball
          npm pack --pack-destination "$PWD/tarball"
          TARBALL=$(ls tarball/grethel-labs-excaliplant-*.tgz | head -1)
          echo "tarball=$PWD/$TARBALL" >> "$GITHUB_OUTPUT"
      - name: Smoke-install in clean project
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: |
          mkdir smoke-test
          cp scripts/smoke.mjs smoke-test/
          cd smoke-test
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "$TARBALL"
          node smoke.mjs

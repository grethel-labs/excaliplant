name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Verify package.json version matches tag
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi
      - name: Check npm token and publication state
        id: npm_state
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PKG_NAME="$(node -p "require('./package.json').name")"
          PKG_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PKG_NAME}@${PKG_VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PKG_NAME}@${PKG_VERSION} is already published; npm publish will be skipped."
            exit 0
          fi

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing NPM_TOKEN repository secret."
            exit 1
          fi

          if ! npm whoami --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "::error::NPM_TOKEN is invalid, expired, or lacks registry access."
            exit 1
          fi

          echo "published=false" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run format:check
      - run: npm test
      - name: npm audit (production, fail on high)
        run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - name: Commit generated docs (keeps working tree clean for prepublishOnly)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/API.md docs/module-coverage.md docs/.build-manifest.json docs/ressources/generated/ docs/ressources/module-coverage/
          git diff --cached --quiet || git commit -m "docs: regenerate for ${GITHUB_REF_NAME} [skip ci]"
      - name: Pack + smoke-install (clean project)
        run: |
          set -eux
          mkdir -p tarball
          npm pack --pack-destination "$PWD/tarball"
          TARBALL=$(ls tarball/grethel-labs-excaliplant-*.tgz | head -1)
          mkdir smoke-test
          cp scripts/smoke.mjs smoke-test/
          cd smoke-test
          npm init -y >/dev/null
          npm pkg set type=module
          npm install "$PWD/../$TARBALL"
          node smoke.mjs
          cd ..
          rm -rf smoke-test tarball
      - name: Publish to npm (with provenance)
        if: steps.npm_state.outputs.published != 'true'
        run: EXCALIPLANT_ALLOW_UNTAGGED=1 npm publish --access public --provenance --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          make_latest: true
          generate_release_notes: true
          overwrite_files: true
          files: |
            docs/ressources/generated/svg/*.svg
            docs/ressources/generated/png/*.png
            docs/ressources/generated/puml/*.puml

  pages:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:api
      - name: Stage versioned + latest API docs
        run: |
          set -eux
          VERSION="${GITHUB_REF_NAME#v}"
          # Keep a fixed /<version>/ docs snapshot alongside moving /latest/.
          # docs/API.md is the single-page markdown reference generated by
          # npm run build:api (replaces the former TypeDoc HTML site).
          mkdir -p _site/"$VERSION"
          cp docs/API.md _site/"$VERSION"/index.md
          rm -rf _site/latest
          mkdir -p _site/latest
          cp docs/API.md _site/latest/index.md
          echo "$VERSION" > _site/VERSION
      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true
          commit_message: "docs: publish API docs for ${{ github.ref_name }}"

name: PR release version

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, ready_for_review, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-release-version-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  bump:
    name: Apply release version label
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          ssh-key: ${{ secrets.BOT_SSH_KEY }}
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Resolve release bump from live labels and branch naming
        id: bump
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require("node:child_process");

          const prNumber = process.env.PR_NUMBER || "";
          const branchName = process.env.PR_HEAD_REF || "";
          const releaseLabels = ["release:major", "release:minor", "release:patch"];
          const labelToBump = new Map([
            ["release:major", "major"],
            ["release:minor", "minor"],
            ["release:patch", "patch"],
          ]);

          if (!/^\d+$/.test(prNumber)) {
            console.error(`::error::Invalid PR number: ${JSON.stringify(prNumber)}`);
            process.exit(1);
          }

          function readLiveLabels() {
            const output = execFileSync(
              "gh",
              ["pr", "view", prNumber, "--json", "labels", "--jq", "[.labels[].name]"],
              { encoding: "utf8" },
            );
            return JSON.parse(output);
          }

          function inferReleaseLabelsFromBranch(branch) {
            const hasToken = (token) =>
              new RegExp(`(^|[^a-zA-Z])${token}([^a-zA-Z]|$)`, "i").test(branch);
            const inferred = [];
            if (hasToken("major")) inferred.push("release:major");
            if (hasToken("minor")) inferred.push("release:minor");
            if (hasToken("patch")) inferred.push("release:patch");
            return inferred;
          }

          let labels = readLiveLabels();
          let selected = labels.filter((label) => releaseLabels.includes(label));

          if (selected.length === 0) {
            const inferred = inferReleaseLabelsFromBranch(branchName);
            let selectedReleaseLabel = "release:patch";

            if (inferred.length === 1) {
              selectedReleaseLabel = inferred[0];
              console.error(
                `Auto-labeling PR #${prNumber} from branch "${branchName}" with ${selectedReleaseLabel}.`,
              );
            } else if (inferred.length > 1) {
              console.error(
                `::error::Branch "${branchName}" matches multiple release kinds (${inferred.join(
                  ", ",
                )}). Keep only one of MAJOR/MINOR/PATCH in the branch name or manually add exactly one release label in the GitHub UI.`,
              );
              process.exit(1);
            } else {
              console.error(
                `No MAJOR/MINOR/PATCH token in branch "${branchName}". Auto-labeling with release:patch.`,
              );
            }

            if (!releaseLabels.includes(selectedReleaseLabel)) {
              console.error(
                `::error::Unexpected release label candidate: ${selectedReleaseLabel}`,
              );
              process.exit(1);
            }

            execFileSync(
              "gh",
              ["pr", "edit", prNumber, "--add-label", selectedReleaseLabel],
              { stdio: "inherit" },
            );
            labels = readLiveLabels();
            selected = labels.filter((label) => releaseLabels.includes(label));
          }

          if (selected.length !== 1) {
            console.error(
              `::error::PRs into main must have exactly one release label: release:major, release:minor, or release:patch. Found: ${
                selected.join(", ") || "none"
              }`,
            );
            process.exit(1);
          }

          const selectedLabel = selected[0];
          console.log(`type=${labelToBump.get(selectedLabel)}`);
          console.error(`Release bump: ${labelToBump.get(selectedLabel)} (${selectedLabel})`);
          NODE

      - run: npm ci

      - name: Read base version
        id: base
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          BASE_VERSION=$(git show "origin/${{ github.event.pull_request.base.ref }}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
          echo "version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Base version: $BASE_VERSION"

      - name: Apply release version
        id: version
        run: |
          VERSION=$(node scripts/bump-release-version.mjs --base-version "${{ steps.base.outputs.version }}" --bump "${{ steps.bump.outputs.type }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Target version: $VERSION"

      - name: Rebuild docs for target version
        run: npm run build:docs

      - name: Detect version drift
        id: drift
        run: |
          if git diff --quiet -- package.json package-lock.json README.md docs/.build-manifest.json docs/ressources/generated/; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            git --no-pager diff --stat -- package.json package-lock.json README.md docs/.build-manifest.json docs/ressources/generated/
          fi

      - name: Amend + force-push release version
        if: steps.drift.outputs.drifted == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json README.md docs/.build-manifest.json docs/ressources/generated/
          git commit --amend --no-edit
          git push --force-with-lease origin "HEAD:${{ github.event.pull_request.head.ref }}"

  fork-pr:
    name: Release label required for fork PRs
    if: github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Explain limitation
        run: |
          echo "::error::Fork PRs cannot be auto-amended because release automation needs the repository bot SSH key. Add exactly one release label and update package.json/package-lock.json manually."
          exit 1

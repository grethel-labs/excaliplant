name: Auto release tag on version bump

# Whenever package.json version changes on main, create + push the exact
# immutable v<version> tag. The tag push triggers release.yml which publishes
# the package, marks that GitHub release as latest, and publishes both
# versioned and latest API docs.
#
# Why a separate workflow:
#   - Direct pushes to main are blocked by the "main: PR-only" ruleset,
#     so version bumps already arrive as merged PRs. pr-release-version.yml
#     derives the next package version from exactly one release:* PR label.
#   - This workflow only creates a tag — tag creation is allowed by
#     the rulesets (only deletion / non-fast-forward are blocked on
#     v* tags).
#   - The tag is pushed via the SSH deploy key so the downstream
#     release.yml workflow actually fires (GITHUB_TOKEN-pushed tags
#     do not trigger workflows).

on:
  push:
    branches: [main]
    paths:
      - "package.json"

permissions:
  contents: write

concurrency:
  group: auto-release-tag
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ssh-key: ${{ secrets.BOT_SSH_KEY }}
          persist-credentials: true
          fetch-depth: 0

      - name: Read version
        id: ver
        run: |
          V="v$(node -p "require('./package.json').version")"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.ver.outputs.version }} already exists; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create + push tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.ver.outputs.version }}" -m "Release ${{ steps.ver.outputs.version }}"
          git push origin "${{ steps.ver.outputs.version }}"

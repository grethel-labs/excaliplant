name: Auto patch dependencies (4h)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-patch-deps
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.BOT_SSH_KEY }}
          persist-credentials: true
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Apply patch-level updates
        id: patch
        run: |
          OUT=$(node scripts/auto-patch-deps.mjs)
          echo "$OUT"
          if echo "$OUT" | grep -q "^No patch-level updates"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            SUMMARY=$(echo "$OUT" | awk '/^---SUMMARY---$/{flag=1;next}flag')
            {
              echo "summary<<EOF"
              echo "$SUMMARY"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Audit (always run, fail on high+)
        if: steps.patch.outputs.changed == 'true'
        run: npm audit --omit=dev --audit-level=high

      - name: Run full test pipeline
        if: steps.patch.outputs.changed == 'true'
        run: npm test

      - name: Build (docs + API)
        if: steps.patch.outputs.changed == 'true'
        run: npm run build

      - name: Pack + smoke-install
        if: steps.patch.outputs.changed == 'true'
        run: |
          npm pack --pack-destination /tmp
          TARBALL=$(ls /tmp/grethel-labs-excaliplant-*.tgz | head -1)
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "$TARBALL"
          node -e "import('@grethel-labs/excaliplant').then(m => { if (typeof m.renderPlantUml !== 'function') { console.error('renderPlantUml missing'); process.exit(1); } console.log('smoke OK'); })"

      - name: Bump patch version
        if: steps.patch.outputs.changed == 'true'
        id: bump
        run: |
          NEW_VERSION=$(node scripts/bump-release-version.mjs --bump patch)
          echo "version=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumped to v${NEW_VERSION}"

      - name: Rebuild docs with new version
        if: steps.patch.outputs.changed == 'true'
        run: npm run build:docs

      - name: Open / update auto-patch PR
        if: steps.patch.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/patch-deps"
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Always recreate the auto-patch branch from the current main
          # so old, stale patch attempts get overwritten.
          git checkout -B "$BRANCH"
          git add package.json package-lock.json SECURITY.md README.md docs/.build-manifest.json docs/ressources/generated/
          MSG=$'deps: auto-patch dependencies + release '"${NEW_VERSION}"$'\n\n${{ steps.patch.outputs.summary }}'
          git commit -m "$MSG"
          git push --force-with-lease origin "$BRANCH"

          # Open a PR if none exists yet, otherwise the force-push above
          # has already updated the existing PR.
          if ! gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            PR_URL=$(gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "deps: auto-patch dependencies + release ${NEW_VERSION}" \
              --body "Automated patch-level dependency updates and release ${NEW_VERSION}.

          $(echo '${{ steps.patch.outputs.summary }}')")
            echo "Created PR: $PR_URL"
            
            # Add release:patch label for automated version handling
            PR_NUM=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            if [ -n "$PR_NUM" ]; then
              gh pr edit "$PR_NUM" --add-label "release:patch"
              echo "Added release:patch label to PR #$PR_NUM"
            fi
          else
            # Update existing PR - ensure label is present
            PR_NUM=$(gh pr view "$BRANCH" --json number --jq '.number')
            gh pr edit "$PR_NUM" --add-label "release:patch"
            echo "Ensured release:patch label on existing PR #$PR_NUM"
          fi

          # Auto-merge intentionally disabled: a malicious patch-level
          # release that passes `npm audit` and `npm test` would otherwise
          # land on main without human review. Patch PRs require an
          # explicit reviewer approval before merging.
          # gh pr merge "$BRANCH" --auto --squash

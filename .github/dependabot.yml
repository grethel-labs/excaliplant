version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    labels:
      - dependencies
      - release:patch
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: scope
    # Patches are handled continuously by the 4h auto-patch cron.
    # Dependabot only opens MRs for minor / major bumps so a human
    # can review them.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      production-minor:
        dependency-type: production
        update-types: ["minor"]
      development-minor:
        dependency-type: development
        update-types: ["minor"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions-minor-major:
        update-types: ["minor", "major"]

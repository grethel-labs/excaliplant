# Example style override for excaliplant.
#
# Load with `loadStyleFromFile("./style.example.yaml")` (from
# `@grethel-labs/excaliplant`) before calling `renderPlantUml`. The
# loader supports a small YAML subset: nested maps via 2-space
# indentation, scalars (numbers, true/false/null, quoted/bare strings)
# and `# comments`. Sequences (`-`) are intentionally not supported.

font:
  family: Excalifont
  sizeTitle: 18
  sizeDescription: 13
  sizeEdgeLabel: 10
  sizePlaneTitle: 22
  sizeSubplaneTitle: 16
  glyphRatio: 0.51
  lineHeight: 1.25
  minSize: 8

shape:
  roughness: 1
  connectionRoughness: 0
  edgeLabelRoughness: 0
  fillStyle: solid
  strokeWidth: 2

edgeLabel:
  useLineColor: true
  backgroundColor: "#444444"
  textColor: "#ffffff"
  strokeColor: ""
  paddingX: 6
  paddingY: 2
  maxWidth: 160
  segmentMargin: 24

classDiagram:
  colorByType: false
  typeColors:
    class:
      stroke: "#475569"
      fill: "#f8fafc"
      titleFill: "#e2e8f0"
    abstract:
      stroke: "#7c3aed"
      fill: "#f5f3ff"
      titleFill: "#ddd6fe"
    interface:
      stroke: "#0f766e"
      fill: "#f0fdfa"
      titleFill: "#99f6e4"
    enum:
      stroke: "#b45309"
      fill: "#fffbeb"
      titleFill: "#fde68a"

text:
  autoShrink: true
  minFontSize: 8
